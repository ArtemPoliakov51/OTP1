version: '3.8'

services:
  app:
    image: riikkakoo/attendance-checker:latest
    container_name: attendance-checker-app
    env_file:
          - .env
    environment:
      DB_HOST: host.docker.internal
      DB_PORT: 3306
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      EXPORT_DIR: ${EXPORT_DIR}
      DISPLAY: host.docker.internal:0.0
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
      - ${HOST_EXPORT_DIR}:${EXPORT_DIR}